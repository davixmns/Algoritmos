<script>
    var v = [20, 35, 18, 8, 14, 41, 3, 39];
    var aux;


    for (var i = v.length - 1; i > 0; i--) {
        for (var j = 0; j < i; j++) {
            if (v[j] > v[j + 1]) {
                aux = v[j];
                v[j] = v[j + 1];
                v[j + 1] = aux;
            }
        }
    }
    document.write("Vetor ordenado: " + v);
</script>
