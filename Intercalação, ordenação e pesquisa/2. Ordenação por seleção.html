<script>
    var v = [20, 35, 18, 8, 14, 41, 3, 39];
    var aux;
    var menor;
    document.write("vetor normal: " + v + "<br>");
    for (var i = 0; i < v.length - 1; i++) {
        menor = v[i];
        posicao = i;

        for (var j = i + 1; j < v.length; j++) {
            if (v[j] < menor) {
                menor = v[j];
                posicao = j;
            }
        }
        aux = v[i];
        v[i] = v[posicao];
        v[posicao] = aux;
    }
    document.write("vetor ordenado: " + v);
</script>
